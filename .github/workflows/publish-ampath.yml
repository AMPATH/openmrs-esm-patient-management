name: AMPATH Package Publishing

on:
  push:
    branches: [main]
  release:
    types:
      - created

env:
  TURBO_API: 'http://127.0.0.1:9080'
  TURBO_TOKEN: 'turbo-token'
  TURBO_TEAM: ${{ github.repository_owner }}

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v4

      - name: 🛠️ Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'

      - name: 📦 Install dependencies
        run: yarn install

      - name: 🚀 Setup local cache server for Turborepo
        uses: felixmosh/turborepo-gh-artifacts@v3
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}
          server-token: ${{ env.TURBO_TOKEN }}

      - name: 🧪 Run tests for patient registration app
        run: yarn ampath:test

      - name: 🏗️ Build patient registration app
        run: yarn ampath:build

      - name: 📤 Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: patient-registration-dist
          path: packages/esm-patient-registration-app/dist
          overwrite: true

  publish-next:
    runs-on: ubuntu-latest
    needs: build
    if: >
      github.event_name == 'push' && 
      github.ref == 'refs/heads/main' &&
      github.repository_owner == 'AMPATH'

    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v4

      - name: 🛠️ Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          registry-url: 'https://registry.npmjs.org'

      - name: 📦 Install dependencies
        run: yarn install

      - name: 🔧 Configure Git
        run: |
          git config user.email "devs@ampath.or.ke" 
          git config user.name "AMPATH CI"

      - name: 🏷️ Version with next tag
        run: |
          cd packages/esm-patient-registration-app
          CURRENT_VERSION=$(node -e "console.log(require('./package.json').version)")
          NEXT_VERSION="${CURRENT_VERSION}-next.${{ github.run_number }}"
          yarn version $NEXT_VERSION --immediate
          echo "Publishing version: $NEXT_VERSION"

      - name: 🏗️ Build
        run: |
          cd packages/esm-patient-registration-app
          yarn build

      - name: � Publish to npm with next tag
        run: |
          cd packages/esm-patient-registration-app
          yarn npm publish --tag next --access public
        env:
          YARN_NPM_AUTH_TOKEN: ${{ secrets.NPM_AUTH_TOKEN }}

  publish-release:
    runs-on: ubuntu-latest
    needs: build
    if: >
      github.event_name == 'release' &&
      github.repository_owner == 'AMPATH'

    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v4

      - name: 🛠️ Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          registry-url: 'https://registry.npmjs.org'

      - name: 📦 Install dependencies
        run: yarn install

      - name: 🏷️ Set release version
        run: |
          cd packages/esm-patient-registration-app
          RELEASE_VERSION=${{ github.ref_name }}
          RELEASE_VERSION=${RELEASE_VERSION#v}
          yarn version $RELEASE_VERSION --immediate
          echo "Publishing release version: $RELEASE_VERSION"

      - name: 🏗️ Build
        run: |
          cd packages/esm-patient-registration-app
          yarn build

      - name: � Publish to npm with latest tag
        run: |
          cd packages/esm-patient-registration-app
          yarn npm publish --tag latest --access public
        env:
          YARN_NPM_AUTH_TOKEN: ${{ secrets.NPM_AUTH_TOKEN }}